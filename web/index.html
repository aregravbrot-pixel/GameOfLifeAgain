<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conway's Game of Life</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --accent:    #39d353;
      --btn:       #21262d;
      --btn-hover: #30363d;
      --bar-h:     60px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', Menlo, monospace;
      font-size: 13px;
      user-select: none;
    }

    #canvas-wrap {
      position: fixed;
      inset: 0 0 var(--bar-h) 0;
      overflow: hidden;
    }

    canvas { display: block; cursor: crosshair; }

    /* ── Controls bar ─────────────────────────────────────────────────────── */
    #controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--bar-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
    }

    .sep { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
    .spacer { flex: 1; }

    select, button {
      background: var(--btn);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      transition: background 0.12s, border-color 0.12s;
    }
    select:hover, button:hover  { background: var(--btn-hover); }
    select:focus                { border-color: var(--accent); }
    button.active               { background: var(--accent); color: #0d1117; border-color: var(--accent); font-weight: 600; }

    #seed-select { min-width: 130px; }

    .stats       { display: flex; gap: 18px; color: var(--muted); white-space: nowrap; }
    .stats strong { color: var(--accent); font-weight: 600; }

    .speed-group { display: flex; align-items: center; gap: 8px; }
    .speed-group span { min-width: 72px; text-align: center; color: var(--muted); }

    #btn-slower, #btn-faster { padding: 5px 8px; font-size: 14px; }

    .hint { color: var(--muted); font-size: 11px; white-space: nowrap; }
  </style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="controls">
  <select id="seed-select"></select>
  <button id="btn-reset">Reset</button>
  <div class="sep"></div>
  <div class="stats">
    <span>Gen&nbsp;<strong id="stat-gen">0</strong></span>
    <span>Alive&nbsp;<strong id="stat-alive">0</strong></span>
  </div>
  <div class="spacer"></div>
  <span class="hint">space:pause &nbsp; r:reset &nbsp; s:seed &nbsp; +/−:speed &nbsp; drag:draw</span>
  <div class="sep"></div>
  <button id="btn-pause">Pause</button>
  <div class="speed-group">
    <button id="btn-slower">−</button>
    <span id="speed-label">Speed 3 / 5</span>
    <button id="btn-faster">+</button>
  </div>
</div>

<script>
// ── Seeds (mirrors js/src/seeds.js) ─────────────────────────────────────────
const SEEDS = {
  Random: null,
  Glider: [[0,1],[1,2],[2,0],[2,1],[2,2]],
  Blinker: [[0,0],[0,1],[0,2]],
  Toad: [[0,1],[0,2],[0,3],[1,0],[1,1],[1,2]],
  Beacon: [[0,0],[0,1],[1,0],[1,1],[2,2],[2,3],[3,2],[3,3]],
  Pulsar: [
    [0,2],[0,3],[0,4],[0,8],[0,9],[0,10],
    [2,0],[2,5],[2,7],[2,12],  [3,0],[3,5],[3,7],[3,12],
    [4,0],[4,5],[4,7],[4,12],  [5,2],[5,3],[5,4],[5,8],[5,9],[5,10],
    [7,2],[7,3],[7,4],[7,8],[7,9],[7,10],
    [8,0],[8,5],[8,7],[8,12],  [9,0],[9,5],[9,7],[9,12],
    [10,0],[10,5],[10,7],[10,12],[12,2],[12,3],[12,4],[12,8],[12,9],[12,10],
  ],
  'R-pentomino': [[0,1],[0,2],[1,0],[1,1],[2,1]],
  Acorn:   [[0,1],[1,3],[2,0],[2,1],[2,4],[2,5],[2,6]],
  Diehard: [[0,6],[1,0],[1,1],[2,1],[2,5],[2,6],[2,7]],
  LWSS:    [[0,1],[0,4],[1,0],[2,0],[2,4],[3,0],[3,1],[3,2],[3,3]],
  'Gosper Gun': [
    [0,24],[1,22],[1,24],
    [2,12],[2,13],[2,20],[2,21],[2,34],[2,35],
    [3,11],[3,15],[3,20],[3,21],[3,34],[3,35],
    [4,0],[4,1],[4,10],[4,16],[4,20],[4,21],
    [5,0],[5,1],[5,10],[5,14],[5,16],[5,17],[5,22],[5,24],
    [6,10],[6,16],[6,24],[7,11],[7,15],[8,12],[8,13],
  ],
};
const SEED_NAMES = Object.keys(SEEDS);

// ── Grid logic (mirrors js/src/grid.js) ──────────────────────────────────────
function randomGrid(rows, cols, density = 0.3) {
  return Array.from({ length: rows }, () =>
    Array.from({ length: cols }, () => Math.random() < density ? 1 : 0));
}

function seedGrid(rows, cols, cells) {
  const grid = Array.from({ length: rows }, () => new Array(cols).fill(0));
  const minR = Math.min(...cells.map(([r]) => r));
  const maxR = Math.max(...cells.map(([r]) => r));
  const minC = Math.min(...cells.map(([, c]) => c));
  const maxC = Math.max(...cells.map(([, c]) => c));
  const originR = Math.floor((rows - (maxR - minR + 1)) / 2) - minR;
  const originC = Math.floor((cols - (maxC - minC + 1)) / 2) - minC;
  for (const [r, c] of cells) {
    const nr = originR + r, nc = originC + c;
    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) grid[nr][nc] = 1;
  }
  return grid;
}

function makeGrid(rows, cols, seedName) {
  const cells = SEEDS[seedName];
  if (cells == null) return randomGrid(rows, cols);
  return seedGrid(rows, cols, cells);
}

function countNeighbors(grid, row, col, rows, cols) {
  let n = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++)
      if (dr || dc) n += grid[(row + dr + rows) % rows][(col + dc + cols) % cols];
  return n;
}

function nextGeneration(grid, rows, cols) {
  const next = Array.from({ length: rows }, () => new Array(cols).fill(0));
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
      const n = countNeighbors(grid, r, c, rows, cols);
      next[r][c] = grid[r][c] ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
    }
  return next;
}

function countAlive(grid) {
  return grid.reduce((s, row) => s + row.reduce((a, c) => a + c, 0), 0);
}

// ── Canvas setup ──────────────────────────────────────────────────────────────
const CELL      = 10;  // px per cell (logical)
const SPEEDS    = [250, 150, 80, 40, 20]; // ms per generation
const BG_COLOR  = '#0d1117';
const CELL_COLOR = '#39d353';

const wrap  = document.getElementById('canvas-wrap');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

const state = {
  grid: null, rows: 0, cols: 0,
  generation: 0, paused: false, speedIdx: 2, currentSeed: 'Random',
};

function sizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const W   = wrap.clientWidth;
  const H   = wrap.clientHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.resetTransform();
  ctx.scale(dpr, dpr);
  state.cols = Math.floor(W / CELL);
  state.rows = Math.floor(H / CELL);
}

function initGrid() {
  state.grid = makeGrid(state.rows, state.cols, state.currentSeed);
  state.generation = 0;
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function render() {
  const { grid, rows, cols } = state;

  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = CELL_COLOR;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (grid[r][c]) ctx.fillRect(c * CELL + 1, r * CELL + 1, CELL - 2, CELL - 2);

  document.getElementById('stat-gen').textContent   = state.generation.toLocaleString();
  document.getElementById('stat-alive').textContent = countAlive(grid).toLocaleString();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
let lastTick = 0;

function loop(ts) {
  if (!state.paused && ts - lastTick >= SPEEDS[state.speedIdx]) {
    state.grid = nextGeneration(state.grid, state.rows, state.cols);
    state.generation++;
    lastTick = ts;
  }
  render();
  requestAnimationFrame(loop);
}

// ── Mouse drawing ─────────────────────────────────────────────────────────────
let painting = false;
let paintValue = 1;

function cellAt(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    r: Math.floor((e.clientY - rect.top)  / CELL),
    c: Math.floor((e.clientX - rect.left) / CELL),
  };
}

canvas.addEventListener('mousedown', e => {
  painting = true;
  const { r, c } = cellAt(e);
  if (r >= 0 && r < state.rows && c >= 0 && c < state.cols) {
    paintValue = state.grid[r][c] ? 0 : 1;
    state.grid[r][c] = paintValue;
  }
});
canvas.addEventListener('mousemove', e => {
  if (!painting) return;
  const { r, c } = cellAt(e);
  if (r >= 0 && r < state.rows && c >= 0 && c < state.cols)
    state.grid[r][c] = paintValue;
});
canvas.addEventListener('mouseup',    () => painting = false);
canvas.addEventListener('mouseleave', () => painting = false);

// ── Controls ──────────────────────────────────────────────────────────────────
const seedSelect  = document.getElementById('seed-select');
const btnReset    = document.getElementById('btn-reset');
const btnPause    = document.getElementById('btn-pause');
const btnSlower   = document.getElementById('btn-slower');
const btnFaster   = document.getElementById('btn-faster');
const speedLabel  = document.getElementById('speed-label');

// Populate seed dropdown
SEED_NAMES.forEach(name => {
  const opt = document.createElement('option');
  opt.value = opt.textContent = name;
  seedSelect.appendChild(opt);
});

function syncUI() {
  speedLabel.textContent = `Speed ${state.speedIdx + 1} / 5`;
  btnPause.textContent   = state.paused ? 'Resume' : 'Pause';
  btnPause.classList.toggle('active', state.paused);
  seedSelect.value = state.currentSeed;
}

function changeSeed(name) {
  state.currentSeed = name;
  initGrid();
  syncUI();
}

function setPaused(v) {
  state.paused = v;
  if (!v) lastTick = 0; // don't skip a tick on resume
  syncUI();
}

function setSpeed(idx) {
  state.speedIdx = Math.max(0, Math.min(SPEEDS.length - 1, idx));
  syncUI();
}

seedSelect.addEventListener('change', () => changeSeed(seedSelect.value));
btnReset.addEventListener('click',  () => { initGrid(); syncUI(); });
btnPause.addEventListener('click',  () => setPaused(!state.paused));
btnSlower.addEventListener('click', () => setSpeed(state.speedIdx - 1));
btnFaster.addEventListener('click', () => setSpeed(state.speedIdx + 1));

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target === seedSelect) return; // don't interfere while select is focused
  switch (e.key) {
    case ' ':        e.preventDefault(); setPaused(!state.paused); break;
    case 'r':        initGrid(); syncUI(); break;
    case 's':        seedSelect.focus(); break;
    case '+': case '=': setSpeed(state.speedIdx + 1); break;
    case '-': case '_': setSpeed(state.speedIdx - 1); break;
  }
});

// Resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { sizeCanvas(); initGrid(); syncUI(); }, 150);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
sizeCanvas();
initGrid();
syncUI();
requestAnimationFrame(loop);
</script>
</body>
</html>
